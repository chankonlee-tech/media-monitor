name: 언론계 인사/부고 모니터링

on:
  schedule:
    # 한국시간 09:00~18:00까지 1시간 간격 (UTC 0~9시)
    - cron: '0 0-9 * * *'
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4
    
    - name: Python 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: 의존성 설치
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: 이전 발송 내역 다운로드
      uses: dawidd6/action-download-artifact@v3
      with:
        name: sent-items
        workflow: run.yml
        if_no_artifact_found: warn
      continue-on-error: true  # 첫 실행 시 artifact가 없을 수 있음
    
    - name: 이전 발송 내역 확인
      run: |
        if [ -f sent_items.json ]; then
          echo "✓ 이전 발송 내역을 성공적으로 다운로드했습니다."
          cat sent_items.json
        else
          echo "⚠ 이전 발송 내역이 없습니다. 첫 실행이거나 artifact가 만료되었습니다."
          echo "빈 발송 내역으로 시작합니다."
        fi
    
    - name: 스크래퍼 실행
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      run: |
        python scraper.py
    
    - name: 발송 내역 저장 (Artifact)
      uses: actions/upload-artifact@v4
      if: always()  # 항상 실행하여 발송 내역 저장
      with:
        name: sent-items
        path: sent_items.json
        retention-days: 90  # 90일간 보관
        overwrite: true  # 기존 artifact 덮어쓰기
    
    - name: 실행 기록 커밋 (워크플로우 비활성화 방지)
      if: always()
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # 한국 시간 계산 (UTC+9)
        KST_TIME=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S KST')
        UTC_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
        
        # 실행 기록 파일 생성
        cat > last_run.txt << EOF
마지막 실행 시간:
- 한국시간: ${KST_TIME}
- UTC: ${UTC_TIME}

워크플로우 트리거: ${GITHUB_EVENT_NAME}
실행 번호: #${GITHUB_RUN_NUMBER}
EOF
        
        git add last_run.txt
        git diff --staged --quiet || git commit -m "chore: 자동 실행 기록 업데이트 - ${KST_TIME}"
        git push
